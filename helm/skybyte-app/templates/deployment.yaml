apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skybyte-app.fullname" . }}
  labels:
    app: {{ include "skybyte-app.name" . }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: {{ include "skybyte-app.name" . }}

  template:
    metadata:
      labels:
        app: {{ include "skybyte-app.name" . }}

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: app
          image: your-image
          ports:
            - containerPort: 8080

          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
