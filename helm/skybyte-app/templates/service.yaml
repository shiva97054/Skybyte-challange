apiVersion: v1
kind: Service
metadata:
  name: {{ include "skybyte-app.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "skybyte-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "skybyte-app.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
