name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔹 Python setup
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 🔹 Install dependencies
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest ruff

      # 🔹 Lint Python (ruff)
      - name: Lint code
        run: |
          ruff check app/

      # 🔹 Run tests
      - name: Run tests
        run: |
          pytest app/tests/

      # 🔹 Install Helm
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # 🔹 Helm lint
      - name: Helm lint
        run: |
          helm lint ./helm/skybyte-app

      # 🔹 Helm template validation
      - name: Helm template validation
        run: |
          helm template ./helm/skybyte-app > output.yaml

      # 🔹 Install kubeconform
      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kubeconform -strict output.yaml

      # 🔹 Terraform validation
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v2

      - name: Terraform fmt
        run: terraform fmt -check
        working-directory: terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform

      # 🔹 Docker build (multi-arch)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t test-image .

      # 🔹 Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      # 🔹 Scan filesystem
      - name: Trivy FS scan
        run: |
          trivy fs --exit-code 1 --severity HIGH,CRITICAL .

      # 🔹 Scan Docker image
      - name: Trivy Image scan
        run: |
          docker build -t test-image .
          trivy image --exit-code 1 --severity HIGH,CRITICAL test-image

      # 🔹 Install Kyverno CLI
      - name: Install Kyverno CLI
        run: |
          curl -LO https://github.com/kyverno/kyverno/releases/download/v1.12.5/kyverno-cli_v1.12.5_linux_x86_64.tar.gz
          tar -xvf kyverno-cli_v1.12.5_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/

      # 🔹 Run Kyverno policies
      - name: Validate policies
        run: |
          helm template ./helm/skybyte-app > output.yaml
          kyverno apply policies/ --resource output.yaml
